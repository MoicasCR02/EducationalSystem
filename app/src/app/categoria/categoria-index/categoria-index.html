<div class="grid-container">
  <mat-card appearance="outlined" class="filter">
    <mat-card-header>
      <h1 class="mat-h1">{{ 'CATEGORIES.TITLE' | translate }}</h1>
    </mat-card-header>
    <mat-card-content>
      <mat-form-field class="full-width">
        <mat-label>{{ 'CATEGORIES.NAME_LABEL' | translate }}</mat-label>
        <input matInput />
        <button mat-icon-button matSuffix color="primary">
          <mat-icon>search</mat-icon>
        </button>
      </mat-form-field>
    </mat-card-content>
  </mat-card>

  @if(datos().length > 0){
  <div class="product-list">
    @for (item of datos(); track item.id_categoria ?? $index) {
    <div class="product-card">
      <mat-card appearance="outlined">
        <mat-card-header class="secondary-title title">
          <mat-card-title>{{ item.nombre }}</mat-card-title>
        </mat-card-header>

        <mat-card-content class="content">
          <!-- 📧 Correo -->
          <div class="info-row">
            <mat-icon color="primary">email</mat-icon>
            <span>{{ item.descripcion }}</span>
          </div>

          <mat-divider></mat-divider>
        </mat-card-content>
        <mat-card-footer class="footer">
          <button
            mat-mini-fab
            matTooltip="{{ 'CATEGORIES.DETAIL_TOOLTIP' | translate }}"
            aria-label="{{ 'CATEGORIES.DETAIL_TOOLTIP' | translate }}"
            class="bg-primary"
            (click)="detalle(item.id_categoria)"
          >
            <mat-icon class="mat-18">info</mat-icon>
          </button>

          <button
            mat-mini-fab
            matTooltip="{{ 'CATEGORIES.CONTACT_TOOLTIP' | translate }}"
            aria-label="{{ 'CATEGORIES.CONTACT_TOOLTIP' | translate }}"
            class="bg-secondary"
          >
            <mat-icon class="mat-18">email</mat-icon>
          </button>
        </mat-card-footer>
      </mat-card>
    </div>
    }
  </div>
  } @else {
  <div>
    <p>{{ 'CATEGORIES.NO_RESULTS' | translate }}</p>
  </div>
  }
</div>
