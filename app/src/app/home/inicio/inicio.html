<div class="body-container">
  <mat-card appearance="outlined">
    <mat-card-header class="primary-title">
      <div mat-card-avatar class="example-header-image"></div>
      <mat-card-title>{{ 'APP.TITLE' | translate }}</mat-card-title>
      <mat-card-subtitle>{{ 'APP.SUBTITLE' | translate }}</mat-card-subtitle>
    </mat-card-header>
    <img mat-card-image src="/images/system.jpg" />
    <mat-card-content class="secondary-title">
      <p class="text">{{ 'APP.DESCRIPTION' | translate }}</p>
    </mat-card-content>
  </mat-card>
</div>
