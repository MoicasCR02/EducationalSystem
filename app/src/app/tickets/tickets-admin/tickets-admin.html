<mat-card class="tickets-card">
  <!-- Encabezado del Card -->
  <mat-card-header class="card-header">
  </mat-card-header>

  <mat-card-content>
    <div class="tabla-container">
      <mat-table [dataSource]="dataSource" class="tabla" matSort aria-label="{{ 'TICKETS.TITLE' | translate }}">
        <!-- Columna Titulo -->
        <ng-container matColumnDef="titulo">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'TICKETS.NAME' | translate }}</th>
          <td mat-cell *matCellDef="let row">{{ row.titulo }}</td>
        </ng-container>

        <!-- Columna Descripcion -->
        <ng-container matColumnDef="descripcion">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'TICKETS.DESCRIPTION' | translate }}</th>
          <td mat-cell *matCellDef="let row">{{ row.descripcion }}</td>
        </ng-container>

        <!-- Columna fecha_creacion -->
        <ng-container matColumnDef="fecha_creacion">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>{{ 'TICKETS.CREATED_AT' | translate }}</th>
          <td mat-cell *matCellDef="let row">{{ row.fecha_creacion | date : 'dd/MM/yyyy HH:mm'}}</td>
        </ng-container>

        <!-- Columna Acciones -->
        <ng-container matColumnDef="acciones">
          <th mat-header-cell *matHeaderCellDef>{{ 'TICKETS.OPTIONS' | translate }}</th>
          <td mat-cell *matCellDef="let row" class="acciones-cell">
            <button
              mat-mini-fab
              matTooltip="{{ 'TICKETS.UPDATE' | translate }}"
              class="bg-primary"
              (click)="actualizarTicket(row.id_ticket)"
            >
              <mat-icon>edit</mat-icon>
            </button>
            <button
              mat-mini-fab
              matTooltip="{{ 'TICKETS.DETAIL' | translate }}"
              class="bg-primary"
              (click)="detalleTicket(row.id_ticket)"
            >
              <mat-icon>info</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true" class="header-cell"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
      </mat-table>

      <mat-paginator
        #paginator
        [length]="dataSource.data.length"
        [pageIndex]="0"
        [pageSize]="5"
        [pageSizeOptions]="[3, 5, 10]"
        showFirstLastButtons
      >
      </mat-paginator>
    </div>
  </mat-card-content>
</mat-card>
